name: "Build"
inputs:
  pattern:
    required: true
    type: string
  configuration:
    type: string
    default: Release
  dotnet-version:
    type: string
    default: |
      6.0.x
      8.0.x
      10.0.x

runs:
  using: "composite"
  steps:
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "${{ inputs.dotnet-version }}"

    - name: Restore
      run: dotnet restore "${{ inputs.pattern }}"
      shell: pwsh

    - name: Build
      run: dotnet build "${{ inputs.pattern }}" --configuration ${{ inputs.configuration }} --no-restore
      shell: pwsh
