name: Check PullRequest labels

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - edited
      - ready_for_review
      - review_requested
      - review_request_removed
      - auto_merge_enabled
      - auto_merge_disabled

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6

  check-labels:
    name: Check labels
    runs-on: ubuntu-latest
    needs: labeler
    steps:
      - uses: docker://agilepathway/pull-request-label-checker:latest
        with:
          none_of: status-
          prefix_mode: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker://agilepathway/pull-request-label-checker:latest
        with:
          any_of: category-
          prefix_mode: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
